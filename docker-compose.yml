version: "3.9"

# ============================================================
# Hina WMS - chạy CÙNG network với hina-e-comm
# ============================================================
# Trước khi chạy:
#   1. Đảm bảo hina-e-comm đang chạy (docker-compose của nó)
#   2. Apply migration: psql $DATABASE_URL -f backend/prisma/migrations/20260616100000_wms_init/migration.sql
#   3. Network "hina-network" được tạo bởi E-Comm docker-compose
# ============================================================

networks:
  hina-network:
    name: hina-network
    external: true

services:
  # ============== WMS Backend ==============
  hina-wms-backend:
    build: ./backend
    container_name: hina-wms-backend
    ports:
      - "7777:7777"
    environment:
      NODE_ENV: production
      PORT: 7777
      # Database - dùng chung với E-Comm
      DATABASE_URL: postgresql://${POSTGRES_USER:-lotussouvenir}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-lotussouvenir}?connection_limit=10&connect_timeout=5
      # Redis - dùng chung với E-Comm để sync events
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      # Webhook secret để verify signature từ E-Comm
      WEBHOOK_SECRET: ${WMS_WEBHOOK_SECRET:-hina-wms-webhook-secret}
      # MinIO - dùng chung với E-Comm
      MINIO_BUCKET: ${MINIO_BUCKET:-lotussouvenir}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-https://lotus-souvenir.com/storage}
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://lotus-souvenir.com/storage/lotussouvenir}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lotussouvenir}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4568,http://localhost:8080}
    networks:
      - hina-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7777/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============== WMS Frontend ==============
  hina-wms-frontend:
    build: ./frontend
    container_name: hina-wms-frontend
    ports:
      - "4568:4568"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_WMS_API_URL:-http://hina-wms-backend:7777}
    depends_on:
      - hina-wms-backend
    networks:
      - hina-network
    restart: unless-stopped
